<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vacation Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">Kubernetes + Helm Demo</p>
      <h1>Vacation Gallery</h1>
      <p id="summary">Loading vacation memories...</p>
    
      <div class="toolbar">
        <button id="showAll">All photos</button>
        <button id="showColorado">Colorado</button>
        <button id="showFlorida">Florida</button>
        <button id="showArizona">Arizona</button>
        <button id="showFeatured">Featured</button>
      </div>
    </header>
    
    <main>
      <section id="gallery" class="gallery"></section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
