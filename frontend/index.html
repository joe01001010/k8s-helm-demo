<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vacation Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">Kubernetes + Helm Demo</p>
      <h1>Vacation Gallery</h1>
      <p id="summary">Loading vacation memories...</p>
    
      <div class="toolbar">
        <button id="showAll">All photos</button>
        <button id="showColorado">Colorado</button>
        <button id="showFlorida">Florida</button>
        <button id="showArizona">Arizona</button>
        <button id="showFeatured">Featured</button>
      </div>
    </header>
    
    <main>
      <section class="panel">
        <h2>Create a new photo section</h2>
      
        <form id="sectionForm" class="form-grid">
          <input id="sectionName" placeholder="Section name, e.g. Italy 2026" required />
          <input id="sectionLocation" placeholder="Location, e.g. Italy" />
          <input id="sectionYear" type="number" placeholder="Year" />
          <textarea id="sectionDescription" placeholder="Description"></textarea>
          <button type="submit">Create section</button>
        </form>
      </section>
      
      <section class="panel">
        <h2>Upload a photo</h2>
      
        <form id="uploadForm" class="form-grid">
          <select id="sectionSelect" required>
            <option value="">Choose a section</option>
          </select>
      
          <input id="photoTitle" placeholder="Photo title" required />
          <textarea id="photoCaption" placeholder="Caption"></textarea>
          <input id="photoFile" type="file" accept="image/*" required />
      
          <button type="submit">Upload photo</button>
        </form>
      </section>

      <section class="panel">
        <h2>Sections</h2>
        <div id="sectionButtons" class="toolbar"></div>
      </section>
      <section id="gallery" class="gallery"></section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
