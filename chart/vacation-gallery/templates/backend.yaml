apiVersion: apps/v1
kind: Deployment
metadata:
  name: vacation-gallery-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vacation-gallery-backend
  template:
    metadata:
      labels:
        app: vacation-gallery-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image }}:{{ .Values.backend.tag }}"
          imagePullPolicy: {{ .Values.backend.pullPolicy }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
          env:
            - name: DB_HOST
              value: vacation-gallery-postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: vacation-gallery-postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: vacation-gallery-postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vacation-gallery-postgres-secret
                  key: POSTGRES_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: vacation-gallery-backend
spec:
  selector:
    app: vacation-gallery-backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
